{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | CloudAttend</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />

  <style>
    body {font-family:'Inter',sans-serif;}
    .fc{width:100%;padding:.75rem 1rem .75rem 2.75rem;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;color:#0f172a;font-size:.9rem}
    .iw{position:relative}
    .ii{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:#94a3b8}
    .btn-login{width:100%;padding:.8rem;background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer}
    .err{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:.75rem;color:#dc2626;margin-bottom:1rem}
  </style>
</head>

<body>
<div class="login-page">

  <div class="login-panel">
    <div class="login-box">

      <h1>Welcome Back</h1>

      {% if form.errors %}
      <div class="err">Invalid credentials. Try again.</div>
      {% endif %}

      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}

        <div>
          <label>Username</label>
          <div class="iw">
            <i class="fas fa-user ii"></i>
            <input type="text" name="username" class="fc" required />
          </div>
        </div>

        <div style="margin-top:10px;">
          <label>Password</label>
          <div class="iw">
            <i class="fas fa-lock ii"></i>
            <input type="password" name="password" class="fc" required />
          </div>
        </div>

        <button type="submit" class="btn-login" style="margin-top:15px;">
          Sign In
        </button>
      </form>

      <!-- ✅ CREATE ACCOUNT OPTION ADDED -->
      <div style="text-align:center;margin-top:15px;">
        Don't have an account?
        <a href="/register/" style="color:#6366f1;font-weight:600;">
          Create Account
        </a>
      </div>

    </div>
  </div>

</div>
</body>
</html>
